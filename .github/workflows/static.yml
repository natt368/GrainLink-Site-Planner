name: Deploy Vite React App to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # This cleanly installs your package.json dependencies

      - name: Build website with Vite
        run: npm run build # This compiles your .tsx files into a 'dist' folder

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload compiled assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # This uploads the compiled code instead of raw files

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
